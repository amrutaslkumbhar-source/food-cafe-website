<html>

<head>
    <style>
        #bannimg {
            width: 100%;
            height: 185px;
        }

        .menu {
            display: flex;
            justify-content: flex-end;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: visible;
            background-color: #333333;
        }

        ul li {
            float: left;
        }

        ul li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        ul li a:hover {
            background-color: #111111;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            list-style: none;
            padding: 0;
            min-width: 180px;
        }

        .submenu li {
            padding: 10px;
        }

        .dropdown:hover .submenu {
            display: block;
        }

        .dropdown {
            position: relative;
        }

        .Pizza_divs {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            background: rgba(248, 228, 208, 0.6);
            width: 50%;
            justify-self: center;
            border: 1px white;
            border-style: dashed;
            border-radius: 10px;
            padding: 30px;
            margin: 5px;
        }

        .Pizza_divs h3 {
            display: grid;
            color: aliceblue;
            margin: 0;
            font-size: 20px;
            justify-content: space-between;
        }

        .price {
            color: rgb(50, 24, 3);
            font-weight: bold;
        }

        .Pizza_divs img {
            height: 80px;
            width: 100px;
        }

        .Pizza_divs img:hover {
            -ms-transform: scale(1.5);
            /* IE 9 */
            -webkit-transform: scale(1.5);
            /* Safari 3-8 */
            transform: scale(1.2);
        }

        .Pizza_divs p {
            color: rgb(50, 24, 3);
            font-size: 20px;
        }

        #pizzacontainer {
            background-image: url("images/backgoundimg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="menu">
        <ul>
            <li><a href="main.html">Home</a></li>
            <li class="dropdown"><a href="#">Menu</a>
                <ul class="submenu">
                    <li><a href="pizza.html">Pizza</a></li>
                    <li><a href="burger.html">Burger</a></li>
                    <li><a href="deserts.html">Desserts</a></li>
                    <li><a href="pasta.html">Pasta</a></li>
                </ul>
            </li>
            <li><a href="AboutUs.html">AboutUs</a></li>
            <li><a href="contactUs.html">Contact</a></li>
        </ul>
    </div>
    <header>
        <img id="bannimg" src="images\bann2.jpg" width="auto">
    </header>
    <div id="pizzacontainer"></div>
    <div
        style="display: flex; justify-content: space-between; align-items: flex-start; gap: 30px; font-family: sans-serif; padding: 20px; line-height: 1.6;background-image:url('../exampledemo/images/backgoundimg.jpg');">

        <script src="../exampledemo/data.js"></script>
        <script>
            const container = document.getElementById("pizzacontainer");
            const pizza = menu.filter(item => item.category === "pizza");
            console.log(pizza);
            for (pizza_item = 0; pizza_item < pizza.length; pizza_item++) {

                temp = document.createElement('div');
                temp.className = 'Pizza_divs';
                temp.id = `'Pizza'${pizza[pizza_item].id}`;

                temp.innerHTML = `
            
            <h3>
            <img classname="pizza_imgs" src= ${pizza[pizza_item].img}>    
            ${pizza[pizza_item].name}
            <span class="price">${pizza[pizza_item].price}Rs</span> </h3>
            <p margin-top="8px">${pizza[pizza_item].description}</p>
            `;
                //document.getElementsByTagName('body')[0].appendChild(temp);
                container.appendChild(temp);
            }
        </script>

    </div>
</body>

</html>
