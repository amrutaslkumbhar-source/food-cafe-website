<html>

<head>
    <style>
        #bannimg {
            width: 100%;
            height: 185px;
        }

        .menu {
            display: flex;
            justify-content: flex-end;
        }

        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: visible;
            background-color: #333333;
        }

        ul li {
            float: left;
        }

        ul li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        ul li a:hover {
            background-color: #111111;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            list-style: none;
            padding: 0;
            min-width: 180px;
        }

        .submenu li {
            padding: 10px;
        }

        .dropdown:hover .submenu {
            display: block;
        }

        .dropdown {
            position: relative;
        }
          #contactcontainer {
            background-image: url("images/backgoundimg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            padding: 10px;
        }
       
         /* body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            padding: 40px 20px;
        } */
        .form-container {
            max-width: 450px;
            margin: 30px auto;
            background: #fff8e7; 
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            
        }
        
       
        h2 {
            margin-top: 0;
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Prevents input stretching */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2f260886; /* Clean green button */
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #342604a0;
        }
        
    </style>
</head>

<body>
    <div class="menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li class="dropdown"><a href="#">Menu</a>
                <ul class="submenu">
                    <li><a href="pizza.html">Pizza</a></li>
                    <li><a href="burger.html">Burger</a></li>
                    <li><a href="deserts.html">Desserts</a></li>
                    <li><a href="pasta.html">Pasta</a></li>
                </ul>
            </li>
            <li><a href="booktable.html">Book a table</a></li>
            <!-- <li><a href="AboutUs.html">AboutUs</a></li>
            <li><a href="contactUs.html">Contact</a></li> -->
        </ul>
    </div>
    <header>
        <img id="bannimg" src="images\bann2.jpg" width="auto">
    </header>
    <script>
        function bookTable(event){
           // alert("in");
            event.preventDefault();
             document.getElementById("bookForm").style.display = "none";
            const booking = {
                name : document.getElementById("name").value ,
                phone : document.getElementById("phone").value ,
                guests : document.getElementById("guests").value ,
                date : document.getElementById("date").value ,
                time : document.getElementById("time").value 
            };
            document.getElementById("successCard").style.display = "block";
             document.getElementById("username").innerText=booking.name;
             document.getElementById("guestcount").innerText=booking.guests
           
             let bookings = JSON .parse(localStorage.getItem("bookings")) || [];
             bookings.push(booking);
             localStorage.setItem("bookings" , JSON.stringify(bookings));
            //localStorage.setItem("testhello",booking.name);
            //localStorage.getItem("testhello");
            //alert("table booked successfully");
          
             

        }
    </script>
    <div id="contactcontainer">
      
        <div class="form-container" id="bookForm">
        <form>
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" required>
            </div>

            <div class="form-group">
                <label for="guests">Guests</label>
                <select id="guests" required>
                    <option value="1">1 Person</option>
                    <option value="2" selected>2 People</option>
                    <option value="3">3 People</option>
                    <option value="4">4 People</option>
                    <option value="5+">5+ People</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" required>
            </div>

            <div class="form-group">
                <label for="notes">Notes (Optional)</label>
                <textarea id="notes" rows="3"></textarea>
            </div>

            <button type="submit" onclick="bookTable(event)">Book Now</button>
        </form>
    </div>
    <div class= "form-container" id ="successCard" style="display: none;">
        <h3>Booking Confirmed!</h3>
        <p style="color:#111111">Thank you <span id="username">.</span></p>
        <p style="color:#111111">Your table for <span id="guestcount"></span> guests is reserved.</p>

    </div>
    </div>
    
</body>

</html>
